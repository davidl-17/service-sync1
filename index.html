<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StageOS">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FFFFFF?text=OS">
    <title>StageOS</title>
    
    <style>
        /* Pure iOS OLED Dark Theme */
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --input-bg: #2c2c2e;
            --text: #ffffff;
            --text-sec: #8e8e93;
            --border: #38383a;
            --primary: #0a84ff;
            --green: #30d158;
            --red: #ff453a;
        }

        html { background-color: var(--bg); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            -webkit-font-smoothing: antialiased;
        }

        .header { padding: 16px 0 16px; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        /* Segmented Control */
        .segmented-control {
            display: flex; background: var(--card); padding: 3px; border-radius: 9px; margin-bottom: 24px;
        }
        .segment {
            flex: 1; text-align: center; padding: 7px 0; font-size: 13px; font-weight: 600;
            border-radius: 7px; color: var(--text); cursor: pointer; transition: background 0.2s ease; white-space: nowrap;
        }
        .segment.active { background: var(--input-bg); box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04); }

        /* Views */
        .view { display: none; }
        .view.active-view { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* General UI */
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
        .card-title { font-size: 19px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.3px; }
        .field-label { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }

        /* Horizontal Pack Row */
        .pack-row { background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .pack-main { display: flex; align-items: center; gap: 12px; }
        .pack-label { font-size: 15px; font-weight: 700; color: var(--text); width: 45px; flex-shrink: 0; }
        .select-group { display: flex; flex: 1; gap: 8px; min-width: 0; }

        select, .ios-input {
            width: 100%; box-sizing: border-box; padding: 12px 10px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
            font-size: 16px; font-weight: 500; appearance: none; -webkit-appearance: none;
        }
        select {
            flex: 1; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 6px center; background-size: 12px; padding-right: 20px; text-overflow: ellipsis;
        }
        .mic-select { border-left-width: 5px; }
        .ios-input::placeholder { color: var(--text-sec); opacity: 1; }
        .notes-input { font-size: 14px; padding: 10px 12px; border: 1px dashed var(--border); }
        .input-row { display: flex; gap: 12px; margin-top: 12px; }

        /* Search Bar */
        .search-container { position: relative; margin-bottom: 16px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.6; }
        .search-input { padding-left: 36px; background: var(--card); border: none; }

        /* Stage Area */
        .stage-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; height: 350px; position: relative; overflow: hidden; }
        .stage-front-label { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 2px; }
        .stage-marker { width: 60px; height: 60px; border-radius: 30px; position: absolute; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 6px 12px rgba(0,0,0,0.3); touch-action: none; transition: transform 0.1s; }
        .marker-name { font-size: 13px; font-weight: 700; line-height: 1.1; }
        .marker-iem { font-size: 10px; font-weight: 500; opacity: 0.9; margin-top: 2px; }
        .empty-stage { text-align: center; color: var(--text-sec); font-size: 14px; margin-top: 160px; }

        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; border: none; color: white; cursor: pointer; text-align: center; }
        .add-btn { background: var(--primary); margin-top: 16px; }
        .reset-btn { background: var(--card); color: var(--red); border: 1px solid var(--border); margin-top: 24px; margin-bottom: 40px; }
        .empty-btn { background: rgba(255, 69, 58, 0.1); color: var(--red); margin-top: 16px; margin-bottom: 40px; }

        /* List Items */
        .song-item { display: flex; flex-direction: column; background: var(--card); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; }
        .song-main-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .song-info { flex: 1; }
        .song-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .song-name { font-size: 17px; font-weight: 600; }
        .expand-icon { color: var(--text-sec); font-size: 12px; transition: transform 0.2s ease; cursor: pointer; padding: 4px; }
        .song-meta { font-size: 13px; color: var(--text-sec); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .song-meta span { background: var(--input-bg); padding: 4px 8px; border-radius: 6px; font-weight: 600; }
        
        /* Expandable Details */
        .song-details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); animation: fadeIn 0.2s ease; }
        .artist-label { font-size: 13px; color: var(--text-sec); font-weight: 500; margin-bottom: 12px; }
        .singer-input-container { margin-top: 8px; }

        .action-group { display: flex; gap: 8px; margin-left: 12px; }
        .icon-btn { border: none; width: 34px; height: 34px; border-radius: 17px; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-remove { background: rgba(255, 69, 58, 0.1); color: var(--red); font-size: 16px; }
        .btn-edit { background: rgba(255, 255, 255, 0.1); color: var(--text); font-size: 14px; }
        .btn-add { background: rgba(10, 132, 255, 0.15); color: var(--primary); }
        .btn-check { background: rgba(48, 209, 88, 0.15); color: var(--green); }
        
        /* Edit Modal Overlay */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .modal-card {
            background: var(--card); border-radius: 20px; padding: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid var(--border);
        }
        .modal-btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .modal-btn-row .btn { margin: 0; }
        .btn-cancel { background: var(--input-bg); color: var(--text); }
    </style>
</head>
<body>

    <div class="header">
        <h1>StageOS</h1>
    </div>

    <div class="segmented-control">
        <div class="segment active" id="tab-team" onclick="switchTab('team')">Team</div>
        <div class="segment" id="tab-stage" onclick="switchTab('stage')">Stage</div>
        <div class="segment" id="tab-database" onclick="switchTab('database')">Songs</div>
        <div class="segment" id="tab-setlist" onclick="switchTab('setlist')">Set List</div>
    </div>

    <div id="view-team" class="view active-view">
        <div class="field-label" style="margin: 0 0 12px 4px;">Monitor Assignments</div>
        <div id="team-container"></div>
        <button class="btn reset-btn" onclick="resetTeam()">Reset All Assignments</button>
    </div>

    <div id="view-stage" class="view">
        <div class="field-label" style="margin: 0 0 12px 4px;">Drag to arrange</div>
        <div class="stage-container" id="stage-box">
            <div class="stage-front-label">Front of Stage</div>
            <div id="empty-stage-msg" class="empty-stage">Assign singers in Team Setup</div>
            <div id="markers-layer"></div>
        </div>
    </div>

    <div id="view-database" class="view">
        <div class="card">
            <div class="card-title">Add to Song Library</div>
            <input type="text" id="db-song-name" placeholder="Song Title" class="ios-input">
            <input type="text" id="db-song-artist" placeholder="Original Artist (Optional)" class="ios-input" style="margin-top: 12px;">
            <div class="input-row">
                <input type="text" id="db-song-key" placeholder="Key (e.g. C#)" class="ios-input">
                <input type="number" id="db-song-bpm" placeholder="BPM" class="ios-input" inputmode="numeric">
            </div>
            <button class="btn add-btn" onclick="addSongToDB()">Save to Library</button>
        </div>
        
        <div class="field-label" style="margin: 24px 0 12px 4px;">Master Library</div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="db-search-bar" class="ios-input search-input" placeholder="Search library..." oninput="renderDatabase(this.value)">
        </div>
        <div id="database-container"></div>
    </div>

    <div id="view-setlist" class="view">
        <div class="field-label" style="margin: 0 0 12px 4px;">Current Sunday Set</div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="setlist-search-bar" class="ios-input search-input" placeholder="Search set list..." oninput="renderSetlist(this.value)">
        </div>
        <div id="setlist-container"></div>
        <button class="btn empty-btn" onclick="clearSetlist()">Clear Set List</button>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="card-title">Edit Song</div>
            <div class="field-label">Song Title</div>
            <input type="text" id="edit-song-name" class="ios-input" style="margin-bottom: 12px;">
            <div class="field-label">Original Artist</div>
            <input type="text" id="edit-song-artist" class="ios-input" style="margin-bottom: 12px;">
            <div class="input-row" style="margin-top: 0; margin-bottom: 12px;">
                <div style="flex: 1;">
                    <div class="field-label">Key</div>
                    <input type="text" id="edit-song-key" class="ios-input">
                </div>
                <div style="flex: 1;">
                    <div class="field-label">BPM</div>
                    <input type="number" id="edit-song-bpm" class="ios-input" inputmode="numeric">
                </div>
            </div>
            <div class="modal-btn-row">
                <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn add-btn" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const iems = [1, 2, 3, 4];
        const singers = ['Unassigned', 'Ally', 'Sophia', 'Cici', 'Jake', 'Yara', 'Raquel'];
        const mics = ['Unassigned', 'Blue', 'Purple', 'Orange', 'White', 'Red', 'Yellow'];
        const micColors = { 'Blue': '#0a84ff', 'Purple': '#bf5af2', 'Orange': '#ff9f0a', 'White': '#d1d1d6', 'Red': '#ff453a', 'Yellow': '#ffd60a' };
        const defaultPositions = { 1: {x: 15, y: 45}, 2: {x: 35, y: 45}, 3: {x: 55, y: 45}, 4: {x: 75, y: 45} };

        // Data Management
        let setlist = JSON.parse(localStorage.getItem('sync-setlist')) || [];
        let database = JSON.parse(localStorage.getItem('sync-database')) || [];
        let currentEditId = null;

        // ID Generator for syncing edits
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        // Silent Migration: Assign IDs to old songs to ensure the Edit feature works perfectly
        let needsSave = false;
        database.forEach(s => { if(!s.id) { s.id = generateId(); needsSave = true; } });
        setlist.forEach(s => { if(!s.id) { s.id = generateId(); needsSave = true; } });
        if(needsSave) {
            localStorage.setItem('sync-database', JSON.stringify(database));
            localStorage.setItem('sync-setlist', JSON.stringify(setlist));
        }

        window.switchTab = function(tab) {
            ['team', 'stage', 'database', 'setlist'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`view-${t}`).classList.remove('active-view');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`view-${tab}`).classList.add('active-view');
            
            if(tab === 'stage') renderStage();
            if(tab === 'database') { document.getElementById('db-search-bar').value = ''; renderDatabase(); }
            if(tab === 'setlist') { document.getElementById('setlist-search-bar').value = ''; renderSetlist(); }
        };

        // UI Toggles
        window.toggleDetails = function(id) {
            const el = document.getElementById(`details-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if(el.style.display === 'block') {
                el.style.display = 'none'; icon.style.transform = 'rotate(0deg)';
            } else {
                el.style.display = 'block'; icon.style.transform = 'rotate(180deg)';
            }
        };

        // TEAM & STAGE LOGIC (Unchanged)
        function renderTeam() {
            const container = document.getElementById('team-container');
            container.innerHTML = '';
            iems.forEach(iem => {
                const savedSinger = localStorage.getItem(`sync-iem${iem}-singer`) || 'Unassigned';
                const savedMic = localStorage.getItem(`sync-iem${iem}-mic`) || 'Unassigned';
                const savedNotes = localStorage.getItem(`sync-iem${iem}-notes`) || '';
                const borderColor = micColors[savedMic] || 'var(--border)';
                const row = document.createElement('div');
                row.className = 'pack-row';
                row.innerHTML = `
                    <div class="pack-main">
                        <div class="pack-label">IEM ${iem}</div>
                        <div class="select-group">
                            <select onchange="localStorage.setItem('sync-iem${iem}-singer', this.value); renderStage();">${singers.map(s => `<option value="${s}" ${s === savedSinger ? 'selected' : ''}>${s}</option>`).join('')}</select>
                            <select class="mic-select" style="border-left-color: ${borderColor};" onchange="updateMic(this, ${iem}); renderStage();">${mics.map(m => `<option value="${m}" ${m === savedMic ? 'selected' : ''}>${m}</option>`).join('')}</select>
                        </div>
                    </div>
                    <input type="text" class="ios-input notes-input" placeholder="Notes" value="${savedNotes}" oninput="localStorage.setItem('sync-iem${iem}-notes', this.value)">
                `;
                container.appendChild(row);
            });
        }

        window.updateMic = function(selectElem, iem) {
            const val = selectElem.value;
            localStorage.setItem(`sync-iem${iem}-mic`, val);
            selectElem.style.borderLeftColor = micColors[val] || 'var(--border)';
        };

        function renderStage() {
            const layer = document.getElementById('markers-layer');
            const emptyMsg = document.getElementById('empty-stage-msg');
            layer.innerHTML = '';
            let hasMarkers = false;
            iems.forEach(iem => {
                const singer = localStorage.getItem(`sync-iem${iem}-singer`) || 'Unassigned';
                const mic = localStorage.getItem(`sync-iem${iem}-mic`) || 'Unassigned';
                if(singer !== 'Unassigned') {
                    hasMarkers = true;
                    const posX = localStorage.getItem(`sync-iem${iem}-x`) || defaultPositions[iem].x;
                    const posY = localStorage.getItem(`sync-iem${iem}-y`) || defaultPositions[iem].y;
                    const marker = document.createElement('div');
                    marker.className = 'stage-marker';
                    marker.setAttribute('data-iem', iem);
                    marker.style.backgroundColor = micColors[mic] || '#38383a';
                    if(mic === 'White' || mic === 'Yellow') { marker.style.color = '#000000'; marker.style.textShadow = 'none'; }
                    marker.style.left = `${posX}%`; marker.style.top = `${posY}%`;
                    marker.innerHTML = `<div class="marker-name">${singer.substring(0, 5)}</div><div class="marker-iem">IEM ${iem}</div>`;
                    layer.appendChild(marker);
                }
            });
            emptyMsg.style.display = hasMarkers ? 'none' : 'block';
        }

        // Drag Logic
        const stageBox = document.getElementById('stage-box');
        let activeDrag = null, startX, startY, initLeft, initTop;
        stageBox.addEventListener('touchstart', (e) => {
            const marker = e.target.closest('.stage-marker');
            if (!marker) return;
            activeDrag = marker;
            const touch = e.touches[0];
            startX = touch.clientX; startY = touch.clientY;
            initLeft = activeDrag.offsetLeft; initTop = activeDrag.offsetTop;
            activeDrag.style.transform = 'scale(1.15)'; activeDrag.style.zIndex = 100;
            e.preventDefault(); 
        }, { passive: false });
        stageBox.addEventListener('touchmove', (e) => {
            if (!activeDrag) return;
            e.preventDefault(); 
            const touch = e.touches[0];
            let newLeft = initLeft + (touch.clientX - startX);
            let newTop = initTop + (touch.clientY - startY);
            const maxW = stageBox.clientWidth - activeDrag.offsetWidth;
            const maxH = stageBox.clientHeight - activeDrag.offsetHeight;
            if (newLeft < 0) newLeft = 0; if (newLeft > maxW) newLeft = maxW;
            if (newTop < 0) newTop = 0; if (newTop > maxH) newTop = maxH;
            activeDrag.style.left = `${newLeft}px`; activeDrag.style.top = `${newTop}px`;
        }, { passive: false });
        stageBox.addEventListener('touchend', () => {
            if (!activeDrag) return;
            activeDrag.style.transform = 'scale(1)'; activeDrag.style.zIndex = 1;
            const percX = (activeDrag.offsetLeft / stageBox.clientWidth) * 100;
            const percY = (activeDrag.offsetTop / stageBox.clientHeight) * 100;
            const iem = activeDrag.getAttribute('data-iem');
            localStorage.setItem(`sync-iem${iem}-x`, percX); localStorage.setItem(`sync-iem${iem}-y`, percY);
            activeDrag = null;
        });

        window.resetTeam = function() {
            if(confirm('Reset all assignments, notes, and stage positions?')) {
                iems.forEach(iem => { ['singer', 'mic', 'notes', 'x', 'y'].forEach(k => localStorage.removeItem(`sync-iem${iem}-${k}`)); });
                renderTeam(); renderStage();
            }
        };

        // DATABASE LOGIC (Master Library)
        window.renderDatabase = function(query = '') {
            const container = document.getElementById('database-container');
            container.innerHTML = '';
            
            const filteredDB = database.filter(song => song.name.toLowerCase().includes(query.toLowerCase()));
            if(filteredDB.length === 0) { container.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:20px; font-size: 15px;">No songs found.</div>'; return; }
            
            filteredDB.forEach(song => {
                const isInSetlist = setlist.some(s => s.id === song.id);
                const hasArtist = song.artist && song.artist.trim() !== "";
                
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <div class="song-main-row">
                        <div class="song-info">
                            <div class="song-name-row" onclick="toggleDetails('${song.id}')">
                                <div class="song-name">${song.name}</div>
                                ${hasArtist ? `<div class="expand-icon" id="icon-${song.id}">▼</div>` : ''}
                            </div>
                            <div class="song-meta"><span>Key: ${song.key || '--'}</span><span>BPM: ${song.bpm || '--'}</span></div>
                        </div>
                        <div class="action-group">
                            <button class="icon-btn btn-edit" onclick="openEditModal('${song.id}')">✎</button>
                            ${isInSetlist ? `<button class="icon-btn btn-check">✓</button>` : `<button class="icon-btn btn-add" onclick="pushToSetlist('${song.id}')">+</button>`}
                            <button class="icon-btn btn-remove" style="background:transparent;" onclick="deleteFromDB('${song.id}')">🗑</button>
                        </div>
                    </div>
                    ${hasArtist ? `<div class="song-details" id="details-${song.id}"><div class="artist-label">Artist: ${song.artist}</div></div>` : ''}
                `;
                container.appendChild(item);
            });
        }

        window.addSongToDB = function() {
            const n = document.getElementById('db-song-name'), a = document.getElementById('db-song-artist'), k = document.getElementById('db-song-key'), b = document.getElementById('db-song-bpm');
            if(!n.value.trim()) return alert("Please enter a song title.");
            database.push({ id: generateId(), name: n.value.trim(), artist: a.value.trim(), key: k.value.trim().toUpperCase(), bpm: b.value.trim() });
            localStorage.setItem('sync-database', JSON.stringify(database));
            n.value = ''; a.value = ''; k.value = ''; b.value = ''; 
            document.getElementById('db-search-bar').value = ''; 
            renderDatabase();
        };

        window.deleteFromDB = function(id) {
            if(confirm('Permanently delete this song from your master library?')) { 
                database = database.filter(s => s.id !== id);
                localStorage.setItem('sync-database', JSON.stringify(database)); 
                renderDatabase(document.getElementById('db-search-bar').value); 
            }
        };

        window.pushToSetlist = function(id) {
            const song = database.find(s => s.id === id);
            if(song && !setlist.some(s => s.id === id)) {
                // Clone the song so setlist can have its own Lead Singer field while retaining the matching ID
                setlist.push({...song, singer: ""});
                localStorage.setItem('sync-setlist', JSON.stringify(setlist));
                renderDatabase(document.getElementById('db-search-bar').value); 
            }
        };

        // EDIT LOGIC
        window.openEditModal = function(id) {
            const song = database.find(s => s.id === id);
            if(!song) return;
            currentEditId = id;
            document.getElementById('edit-song-name').value = song.name || '';
            document.getElementById('edit-song-artist').value = song.artist || '';
            document.getElementById('edit-song-key').value = song.key || '';
            document.getElementById('edit-song-bpm').value = song.bpm || '';
            document.getElementById('edit-modal').style.display = 'flex';
        };

        window.closeEditModal = function() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditId = null;
        };

        window.saveEdit = function() {
            const n = document.getElementById('edit-song-name').value;
            const a = document.getElementById('edit-song-artist').value;
            const k = document.getElementById('edit-song-key').value;
            const b = document.getElementById('edit-song-bpm').value;

            if(!n.trim()) return alert("Title is required.");

            // Update Master DB
            const dbSong = database.find(s => s.id === currentEditId);
            if(dbSong) { dbSong.name = n.trim(); dbSong.artist = a.trim(); dbSong.key = k.trim().toUpperCase(); dbSong.bpm = b.trim(); }
            localStorage.setItem('sync-database', JSON.stringify(database));

            // Sync with Setlist automatically
            const setSong = setlist.find(s => s.id === currentEditId);
            if(setSong) { setSong.name = n.trim(); setSong.artist = a.trim(); setSong.key = k.trim().toUpperCase(); setSong.bpm = b.trim(); }
            localStorage.setItem('sync-setlist', JSON.stringify(setlist));

            closeEditModal();
            renderDatabase(document.getElementById('db-search-bar').value);
            if(document.getElementById('view-setlist').classList.contains('active-view')) {
                renderSetlist(document.getElementById('setlist-search-bar').value);
            }
        };

        // SETLIST LOGIC (Current Sunday)
        window.renderSetlist = function(query = '') {
            const container = document.getElementById('setlist-container');
            container.innerHTML = '';
            
            const filteredSetlist = setlist.filter(song => song.name.toLowerCase().includes(query.toLowerCase()));
            if(filteredSetlist.length === 0) { container.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:20px; font-size: 15px;">Set list is empty. Add songs from your Library.</div>'; return; }
            
            filteredSetlist.forEach(song => {
                const hasArtist = song.artist && song.artist.trim() !== "";
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <div class="song-main-row">
                        <div class="song-info">
                            <div class="song-name-row" onclick="toggleDetails('set-${song.id}')">
                                <div class="song-name">${song.name}</div>
                                <div class="expand-icon" id="icon-set-${song.id}">▼</div>
                            </div>
                            <div class="song-meta">
                                <span>Key: ${song.key || '--'}</span>
                                <span>BPM: ${song.bpm || '--'}</span>
                                ${song.singer ? `<span style="background: rgba(10, 132, 255, 0.2); color: var(--primary);">🎤 ${song.singer}</span>` : ''}
                            </div>
                        </div>
                        <button class="icon-btn btn-remove" onclick="removeFromSetlist('${song.id}')">✕</button>
                    </div>
                    <div class="song-details" id="details-set-${song.id}">
                        ${hasArtist ? `<div class="artist-label">Artist: ${song.artist}</div>` : ''}
                        <div class="singer-input-container">
                            <input type="text" class="ios-input" placeholder="Assign Lead Singer(s)..." value="${song.singer || ''}" oninput="updateSetlistSinger('${song.id}', this.value)">
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.updateSetlistSinger = function(id, val) {
            const song = setlist.find(s => s.id === id);
            if(song) {
                song.singer = val;
                localStorage.setItem('sync-setlist', JSON.stringify(setlist));
                // Only re-render the preview badges, not the whole list, to prevent input losing focus while typing
                const query = document.getElementById('setlist-search-bar').value;
                // Minor delay to update visually after they finish typing
                clearTimeout(window.singerTypingTimer);
                window.singerTypingTimer = setTimeout(() => {
                    const activeDetails = [];
                    // Remember which dropdowns are open before re-rendering
                    setlist.forEach(s => {
                        const el = document.getElementById(`details-set-${s.id}`);
                        if(el && el.style.display === 'block') activeDetails.push(s.id);
                    });
                    renderSetlist(query);
                    activeDetails.forEach(sid => toggleDetails(`set-${sid}`)); // Re-open them
                }, 1000);
            }
        };
        
        window.removeFromSetlist = function(id) {
            setlist = setlist.filter(s => s.id !== id);
            localStorage.setItem('sync-setlist', JSON.stringify(setlist)); 
            renderSetlist(document.getElementById('setlist-search-bar').value); 
        };

        window.clearSetlist = function() {
            if(confirm('Clear all songs from the current Sunday set list? (They will remain in your master library).')) {
                setlist = [];
                localStorage.setItem('sync-setlist', JSON.stringify(setlist));
                renderSetlist();
            }
        };

        // Init
        renderTeam();
    </script>
</body>
</html>
