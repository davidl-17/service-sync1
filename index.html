<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ServiceSync">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FFFFFF?text=Sync">
    <title>Service Organizer</title>
    <style>
        /* Apple-inspired Light/Dark mode colors */
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --text-sec: #8e8e93;
            --border: #e5e5ea;
            --blue: #007aff;
            --red: #ff3b30;
            --seg-bg: #e3e3e8;
            --stage-bg: #e5e5ea;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --text: #f2f2f7;
                --text-sec: #8e8e93;
                --border: #38383a;
                --seg-bg: #2c2c2e;
                --stage-bg: #151515;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            -webkit-font-smoothing: antialiased;
        }

        .header { padding: 16px 0 16px; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        /* Segmented Control (Tabs) */
        .segmented-control {
            display: flex;
            background: var(--seg-bg);
            padding: 3px;
            border-radius: 9px;
            margin-bottom: 24px;
        }
        .segment {
            flex: 1;
            text-align: center;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 7px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .segment.active {
            background: var(--card);
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
        }

        /* Views */
        .view { display: none; }
        .view.active-view { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* Shared UI */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .card-title { font-size: 19px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.3px; }
        .field-label { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }

        /* Horizontal Pack Row Design */
        .pack-row {
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            gap: 10px;
        }
        .pack-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pack-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            width: 45px;
            flex-shrink: 0;
        }
        .select-group {
            display: flex;
            flex: 1;
            gap: 6px;
            min-width: 0;
        }

        select, .ios-input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 16px; /* Prevents Safari zoom */
            font-weight: 500;
            appearance: none;
            -webkit-appearance: none;
        }
        
        select {
            flex: 1;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 6px center;
            background-size: 12px;
            padding-right: 20px;
            text-overflow: ellipsis;
        }
        .pos-select { flex: 0.6; } /* Slightly smaller for Left/Center/Right */
        .mic-select { border-left-width: 5px; }
        
        .ios-input::placeholder { color: var(--text-sec); opacity: 0.8; }
        .notes-input { font-size: 14px; padding: 10px 12px; background: transparent; border-style: dashed; }
        .input-row { display: flex; gap: 12px; margin-top: 12px; }

        /* Stage Plot Design */
        .stage-container {
            background: var(--stage-bg);
            border-radius: 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .stage-curve {
            position: absolute;
            bottom: -50px;
            left: -10%;
            width: 120%;
            height: 100px;
            background: var(--card);
            border-radius: 50%;
            opacity: 0.5;
        }
        .stage-zones {
            display: flex;
            justify-content: space-between;
            flex: 1;
            z-index: 1;
            margin-top: 20px;
        }
        .zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .zone-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .stage-marker {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .marker-name { font-size: 14px; font-weight: 700; line-height: 1.1; }
        .marker-iem { font-size: 10px; font-weight: 500; opacity: 0.9; margin-top: 2px; }
        .empty-stage { text-align: center; color: var(--text-sec); font-size: 14px; margin-top: 40px; z-index: 1;}

        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; border: none; color: white; cursor: pointer; text-align: center; }
        .add-btn { background: var(--blue); margin-top: 16px; }
        .reset-btn { background: var(--red); margin-top: 24px; margin-bottom: 40px; }

        /* Setlist Items */
        .song-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.02); }
        .song-info { flex: 1; }
        .song-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .song-meta { font-size: 13px; color: var(--text-sec); display: flex; gap: 8px; }
        .song-meta span { background: var(--bg); padding: 4px 8px; border-radius: 6px; font-weight: 600; }
        .delete-btn { background: rgba(255, 59, 48, 0.1); color: var(--red); border: none; width: 34px; height: 34px; border-radius: 17px; font-size: 16px; display: flex; align-items: center; justify-content: center; margin-left: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ServiceSync</h1>
    </div>

    <!-- Segmented Control -->
    <div class="segmented-control">
        <div class="segment active" id="tab-team" onclick="switchTab('team')">Team Setup</div>
        <div class="segment" id="tab-stage" onclick="switchTab('stage')">Stage Plot</div>
        <div class="segment" id="tab-setlist" onclick="switchTab('setlist')">Set List</div>
    </div>

    <!-- Team View -->
    <div id="view-team" class="view active-view">
        <div class="field-label" style="margin: 0 0 12px 4px;">Monitor & DSP Assignments</div>
        <div id="team-container"></div>
        <button class="btn reset-btn" onclick="resetTeam()">Reset All Assignments</button>
    </div>

    <!-- Stage View -->
    <div id="view-stage" class="view">
        <div class="field-label" style="margin: 0 0 12px 4px;">Live Frontline Layout</div>
        <div class="stage-container">
            <div class="stage-curve"></div>
            <div class="stage-zones">
                <div class="zone" id="stage-left"><div class="zone-title">Stage Left</div></div>
                <div class="zone" id="stage-center"><div class="zone-title">Center</div></div>
                <div class="zone" id="stage-right"><div class="zone-title">Stage Right</div></div>
            </div>
            <div id="empty-stage-msg" class="empty-stage">Assign positions in Team Setup</div>
        </div>
    </div>

    <!-- Setlist View -->
    <div id="view-setlist" class="view">
        <div class="card">
            <div class="card-title">Add New Song</div>
            <input type="text" id="song-name" placeholder="Song Title" class="ios-input">
            <div class="input-row">
                <input type="text" id="song-key" placeholder="Key (e.g. C#)" class="ios-input">
                <input type="number" id="song-bpm" placeholder="BPM" class="ios-input" inputmode="numeric">
            </div>
            <button class="btn add-btn" onclick="addSong()">Add to Set</button>
        </div>
        <div class="field-label" style="margin: 24px 0 12px 4px;">Current Set</div>
        <div id="setlist-container"></div>
    </div>

    <script>
        const iems = [1, 2, 3, 4];
        const singers = ['Unassigned', 'Ally', 'Sophia', 'Cici', 'Jake', 'Yara', 'Raquel'];
        const mics = ['Unassigned', 'Blue', 'Purple', 'Orange', 'White', 'Red', 'Yellow'];
        const positions = ['Pos?', 'Left', 'Center', 'Right'];
        
        const micColors = {
            'Blue': '#0a84ff', 'Purple': '#bf5af2', 'Orange': '#ff9f0a', 
            'White': '#a1a1aa', /* darker gray so white text shows */
            'Red': '#ff453a', 'Yellow': '#d4b000' /* darker yellow for contrast */
        };

        let setlist = JSON.parse(localStorage.getItem('sync-setlist')) || [];

        window.switchTab = function(tab) {
            ['team', 'stage', 'setlist'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`view-${t}`).classList.remove('active-view');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`view-${tab}`).classList.add('active-view');
            
            if(tab === 'stage') renderStage();
        };

        function renderTeam() {
            const container = document.getElementById('team-container');
            container.innerHTML = '';

            iems.forEach(iem => {
                const savedSinger = localStorage.getItem(`sync-iem${iem}-singer`) || 'Unassigned';
                const savedMic = localStorage.getItem(`sync-iem${iem}-mic`) || 'Unassigned';
                const savedPos = localStorage.getItem(`sync-iem${iem}-pos`) || 'Pos?';
                const savedNotes = localStorage.getItem(`sync-iem${iem}-notes`) || '';
                const borderColor = micColors[savedMic] || 'var(--border)';

                const row = document.createElement('div');
                row.className = 'pack-row';
                row.innerHTML = `
                    <div class="pack-main">
                        <div class="pack-label">IEM ${iem}</div>
                        <div class="select-group">
                            <select onchange="localStorage.setItem('sync-iem${iem}-singer', this.value); renderStage();">
                                ${singers.map(s => `<option value="${s}" ${s === savedSinger ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                            <select class="mic-select" style="border-left-color: ${borderColor};" onchange="updateMic(this, ${iem}); renderStage();">
                                ${mics.map(m => `<option value="${m}" ${m === savedMic ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                            <select class="pos-select" onchange="localStorage.setItem('sync-iem${iem}-pos', this.value); renderStage();">
                                ${positions.map(p => `<option value="${p}" ${p === savedPos ? 'selected' : ''}>${p}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <input type="text" class="ios-input notes-input" placeholder="Mix notes (e.g. SQ7 bus, EQ thresholds...)" value="${savedNotes}" oninput="localStorage.setItem('sync-iem${iem}-notes', this.value)">
                `;
                container.appendChild(row);
            });
        }

        window.updateMic = function(selectElem, iem) {
            const val = selectElem.value;
            localStorage.setItem(`sync-iem${iem}-mic`, val);
            selectElem.style.borderLeftColor = micColors[val] || 'var(--border)';
        };

        function renderStage() {
            const leftZone = document.getElementById('stage-left');
            const centerZone = document.getElementById('stage-center');
            const rightZone = document.getElementById('stage-right');
            const emptyMsg = document.getElementById('empty-stage-msg');
            
            // Clear existing markers (keep titles)
            [leftZone, centerZone, rightZone].forEach(z => {
                while(z.childNodes.length > 1) z.removeChild(z.lastChild);
            });

            let hasMarkers = false;

            iems.forEach(iem => {
                const singer = localStorage.getItem(`sync-iem${iem}-singer`) || 'Unassigned';
                const mic = localStorage.getItem(`sync-iem${iem}-mic`) || 'Unassigned';
                const pos = localStorage.getItem(`sync-iem${iem}-pos`) || 'Pos?';

                if(singer !== 'Unassigned' && pos !== 'Pos?') {
                    hasMarkers = true;
                    const marker = document.createElement('div');
                    marker.className = 'stage-marker';
                    marker.style.backgroundColor = micColors[mic] || '#555';
                    
                    // Format names for tiny bubbles (e.g., first 4 letters)
                    const shortName = singer.substring(0, 5); 
                    
                    marker.innerHTML = `
                        <div class="marker-name">${shortName}</div>
                        <div class="marker-iem">IEM ${iem}</div>
                    `;

                    if(pos === 'Left') leftZone.appendChild(marker);
                    if(pos === 'Center') centerZone.appendChild(marker);
                    if(pos === 'Right') rightZone.appendChild(marker);
                }
            });

            emptyMsg.style.display = hasMarkers ? 'none' : 'block';
        }

        window.resetTeam = function() {
            if(confirm('Reset all assignments and notes?')) {
                iems.forEach(iem => {
                    ['singer', 'mic', 'pos', 'notes'].forEach(k => localStorage.removeItem(`sync-iem${iem}-${k}`));
                });
                renderTeam();
                renderStage();
            }
        };

        // Setlist Functions remain untouched
        function renderSetlist() {
            const container = document.getElementById('setlist-container');
            container.innerHTML = '';
            if(setlist.length === 0) { container.innerHTML = '<div style="text-align:center; color:var(--text-sec); margin-top:20px; font-size: 15px;">Set list is empty.</div>'; return; }
            setlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `<div class="song-info"><div class="song-name">${song.name}</div><div class="song-meta"><span>Key: ${song.key || '--'}</span><span>BPM: ${song.bpm || '--'}</span></div></div><button class="delete-btn" onclick="deleteSong(${index})">✕</button>`;
                container.appendChild(item);
            });
        }
        window.addSong = function() {
            const n = document.getElementById('song-name'), k = document.getElementById('song-key'), b = document.getElementById('song-bpm');
            if(!n.value.trim()) return alert("Please enter a song title.");
            setlist.push({ name: n.value.trim(), key: k.value.trim().toUpperCase(), bpm: b.value.trim() });
            localStorage.setItem('sync-setlist', JSON.stringify(setlist));
            n.value = ''; k.value = ''; b.value = ''; renderSetlist();
        };
        window.deleteSong = function(index) {
            if(confirm('Remove this song?')) { setlist.splice(index, 1); localStorage.setItem('sync-setlist', JSON.stringify(setlist)); renderSetlist(); }
        };

        renderTeam();
        renderStage();
        renderSetlist();
    </script>
</body>
</html>
